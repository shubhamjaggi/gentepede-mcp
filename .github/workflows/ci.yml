name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build, unit tests, MCP smoke test
  # No Terraform or AWS needed — runs in under 3 minutes.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build and run unit tests
        run: ./gradlew build --no-daemon

      # JaCoCo generates XML + HTML coverage reports as a finalizer of the test task.
      # The XML report is needed by the upload step; HTML is for human browsing.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/
          retention-days: 7

      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: gentepede-jar
          path: build/libs/gentepede-mcp-all.jar
          retention-days: 1

      # Starts the JAR, sends initialize + tools/list via JSON-RPC, and verifies
      # all 8 expected tools are registered. Tests Main.kt + Engine.kt protocol layer.
      - name: MCP protocol smoke test
        run: python3 .github/scripts/mcp-smoke-test.py

      # Check that all internal file links in Markdown docs resolve to real files.
      # Uses --offline to skip external URL checks (avoids rate-limit flakiness in CI).
      # This catches broken cross-references between doc files as the repo evolves.
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude-path .gradle
            --exclude-path build
            '**/*.md'
          fail: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Blueprint generate + validate for all 6 blueprints
  # Runs terraform validate + checkov. No AWS API calls — fully static analysis.
  # Runs on every merge so CI catches template issues immediately, not a week later.
  # ─────────────────────────────────────────────────────────────────────────────
  blueprint-validate:
    name: Blueprint Validate (all 6)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: gentepede-jar
          path: build/libs/

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Install checkov
        run: pip install checkov

      - name: Validate all blueprints
        env:
          GENTEPEDE_MODE: LOCAL
        run: |
          set -e
          FAILED=""
          for blueprint_file in src/main/resources/blueprints/*.json; do
            id=$(python3 -c "import json; print(json.load(open('$blueprint_file'))['blueprintId'])")
            echo "── Validating $id ──"
            java -cp build/libs/gentepede-mcp-all.jar \
              com.gentepede.ci.BlueprintVerifierKt \
              --blueprint "$id" \
              --project "ci-validate-${id}" \
            && echo "PASS: $id" || { echo "FAIL: $id"; FAILED="$FAILED $id"; }
          done
          if [ -n "$FAILED" ]; then
            echo "Blueprints that failed validation:$FAILED"
            exit 1
          fi
          echo "All blueprints validated successfully"
