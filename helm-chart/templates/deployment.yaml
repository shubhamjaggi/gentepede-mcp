apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    environment: {{ .Values.environment }}
    managed-by: gentepede-mcp
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        environment: {{ .Values.environment }}
    spec:
      securityContext:
        runAsNonRoot: true        # Container must not run as root (UID 0). A root process
                                  # inside a container has the same powers as root on the host
                                  # if the container escapes. Non-root limits blast radius.
        runAsUser: 1000           # Explicit UID — image must have a user with this ID.
        fsGroup: 2000             # Group ownership for mounted volumes; allows the app
                                  # to write to declared volume mounts as group 2000.
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          # imagePullPolicy controls when the kubelet pulls the container image from the registry.
          # Always: always re-pull on pod start (safe for mutable tags like "latest")
          # IfNotPresent: use cached image if it exists on the node (fastest; use with immutable tags)
          # Never: never pull — image must already exist on the node (CI/local testing only)
          # Production best practice: use immutable image tags (e.g., git SHA) + IfNotPresent.
          # Never use "latest" tag in production — you lose reproducibility and can't roll back.
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false   # Container cannot gain more privileges than
                                              # its parent process, even via setuid binaries.
                                              # Prevents classic privilege escalation attacks.
            readOnlyRootFilesystem: true       # Container cannot write to its own filesystem.
                                              # Forces all writes to declared volume mounts.
                                              # Makes malware persistence significantly harder.
            capabilities:
              drop:
                - ALL                          # Drop all Linux capabilities by default.
                                              # Without this, containers retain capabilities
                                              # like NET_RAW (packet sniffing) and SYS_PTRACE
                                              # (process debugging) inherited from the kernel.
          # ─────────────────────────────────────────────────────────────────────
          # LIVENESS PROBE vs READINESS PROBE — Two Different Health Questions
          #
          # Kubernetes asks two distinct health questions of each pod:
          #
          # LIVENESS PROBE — "Is this container alive or is it stuck/crashed?"
          #   If this fails failureThreshold times, Kubernetes KILLS and RESTARTS
          #   the container. Use it to detect deadlocks, infinite loops, or other
          #   conditions where the process is running but unable to recover itself.
          #   Path: /health/live (or /health) — should return 200 if the process
          #   is healthy enough to handle requests eventually.
          #   initialDelaySeconds: 30 — Spring Boot takes ~20s to start; starting
          #   the probe too early causes false kills before the app is even up.
          #
          # READINESS PROBE — "Is this container ready to receive traffic NOW?"
          #   If this fails, Kubernetes removes the pod from the Service's endpoint
          #   list — the pod is NOT killed, but traffic STOPS routing to it.
          #   The pod resumes receiving traffic once the probe passes again.
          #   Use cases: temporary unreadiness during a database reconnect,
          #   a cache warmup phase, or a maintenance window.
          #   Path: /health/ready — can return 503 if downstream deps are unavailable.
          #   initialDelaySeconds: 10 — readiness is checked sooner than liveness.
          #
          # PRACTICAL EFFECT:
          #   During a rolling deployment, new pods must pass readiness before old
          #   ones are terminated. This guarantees zero-downtime deployments:
          #   traffic never flows to a pod that isn't ready yet.
          #
          # If you only implement one path (/health), point both probes at it.
          # Having separate /health/live and /health/ready endpoints gives finer
          # control (e.g., fail readiness but not liveness during a DB outage —
          # stops new requests but lets the existing container stay alive to recover).
          # ─────────────────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: {{ .Values.health.liveness.path }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 30   # Spring Boot needs ~20s to start; 30s prevents false kills.
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.health.readiness.path }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10   # Readiness is faster — app signals when ready.
            periodSeconds: 5
            failureThreshold: 3
          # ─────────────────────────────────────────────────────────────────────
          # RESOURCE REQUESTS AND LIMITS — Guaranteed vs Maximum Compute
          #
          # Kubernetes resource declarations have two distinct fields:
          #
          # REQUESTS — the GUARANTEED minimum the pod needs:
          #   The Kubernetes scheduler reads requests to decide which node has
          #   enough free capacity to place this pod. If no node has enough free
          #   CPU/memory to satisfy the request, the pod stays Pending.
          #   The node always reserves this amount for the pod.
          #   requests.cpu: "250m" = 0.25 vCPU (1000m = 1 vCPU)
          #   requests.memory: "256Mi" = 256 MiB guaranteed RAM
          #
          # LIMITS — the MAXIMUM the pod is allowed to consume:
          #   CPU LIMIT: the Linux kernel rate-limits (throttles) the process.
          #     Exceeding the CPU limit makes the container run slower — it does NOT
          #     crash. The process gets less CPU time but keeps running.
          #   MEMORY LIMIT: if the container exceeds its memory limit, the kernel
          #     sends an OOMKill (Out Of Memory Kill) signal — the container IS
          #     killed and Kubernetes restarts it. Watch for OOMKilled status.
          #
          # WHY BOTH MATTER:
          #   - Without requests: pods pack too densely onto nodes, causing real-world
          #     contention even if the scheduler thought there was capacity.
          #   - Without limits: one leaking pod can consume all RAM on a node,
          #     causing other pods to be evicted or the node to become unresponsive.
          #   - ResourceQuota (resource-quota.yaml) enforces namespace-level sums
          #     of both requests and limits, requiring every pod to declare them.
          #
          # SIZING GUIDANCE:
          #   Set requests to your normal, steady-state usage. Set limits to your
          #   spike ceiling. A limit:request ratio of 2–4x is common (gives burst
          #   headroom while preventing runaway consumption).
          # ─────────────────────────────────────────────────────────────────────
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp              # readOnlyRootFilesystem=true means the app
                                           # needs an explicit writable /tmp if it creates temp files.
      volumes:
        - name: tmp-dir
          emptyDir: {}                     # ephemeral in-memory volume for temp files only
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname   # Spread pods across different nodes.
                                                      # Without this, all replicas could land on
                                                      # the same node; a single node failure takes
                                                      # the entire service down.
                labelSelector:
                  matchLabels:
                    app: {{ .Release.Name }}
