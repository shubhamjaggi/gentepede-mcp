version: 2

updates:
  # Keep Gradle dependencies (MCP SDK, kotlinx, coroutines, JUnit) up to date.
  # Dependabot opens one PR per outdated dependency, capped at 5 open PRs at a time.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    ignore:
      # Gradle 9 is incompatible with com.gradleup.shadow (mainClassName property removed).
      # Unpin once shadow plugin releases Gradle 9 support.
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]
      # JUnit 5.14+ adds Kotlin contract extensions that conflict with our Assertions.*
      # star-import, causing assertNull/assertNotNull overload resolution ambiguity.
      # JUnit 6 has additional breaking API changes. Revisit when upgrading Kotlin test setup.
      - dependency-name: "org.junit.jupiter:junit-jupiter"
        versions: [">=5.14.0"]
      - dependency-name: "org.junit.jupiter:junit-jupiter-params"
        versions: [">=5.14.0"]
      # kotlinx-serialization 1.8+ requires Kotlin 2.3+; project is on Kotlin 2.1.
      # Bump serialization and Kotlin together when upgrading Kotlin.
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-serialization-json"
        versions: [">=1.8.0"]

  # Keep GitHub Actions versions (actions/checkout, setup-java, etc.) up to date.
  # Uses SHA pinning for third-party actions; Dependabot auto-updates those SHAs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
