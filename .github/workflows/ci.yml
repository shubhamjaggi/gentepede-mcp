name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required by mikepenz/action-junit-report to post test result check runs.
  checks: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build, unit tests, coverage, MCP smoke test, link check
  # No Terraform or AWS needed — runs in under 3 minutes.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build and run unit tests
        run: ./gradlew build --no-daemon

      # Annotate the PR/commit with per-test pass/fail status directly in the
      # GitHub UI. Runs even when build fails so failing tests are visible.
      - name: Annotate test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'build/test-results/test/*.xml'
          check_name: 'Unit Test Results'
          # The build step already fails the job on test failure; this step's
          # job is only to annotate — not to re-fail.
          fail_on_failure: false

      # JaCoCo generates XML + HTML coverage reports as a finalizer of the test task.
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/reports/jacoco/test/
          retention-days: 7

      # Enforce a minimum instruction coverage threshold. Fails the build if
      # coverage falls below the threshold, preventing uncovered regressions.
      # To check current coverage: open the HTML report from the artifact above.
      # To raise the threshold: update the `threshold` variable below.
      - name: Check coverage threshold
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys

          tree = ET.parse("build/reports/jacoco/test/jacocoTestReport.xml")
          root = tree.getroot()
          counter = next(
              (c for c in root.findall("counter") if c.get("type") == "INSTRUCTION"),
              None,
          )
          if counter is None:
              print("WARNING: INSTRUCTION counter not found in JaCoCo report — skipping threshold check")
              sys.exit(0)

          missed = int(counter.get("missed"))
          covered = int(counter.get("covered"))
          total = missed + covered
          pct = covered / total * 100 if total > 0 else 0.0

          threshold = 55  # percent; raise this as test coverage improves
          print(f"Instruction coverage: {pct:.1f}% ({covered}/{total} instructions covered)")
          if pct < threshold:
              print(f"FAIL: {pct:.1f}% is below the required threshold of {threshold}%")
              sys.exit(1)
          print(f"PASS: {pct:.1f}% meets the threshold of {threshold}%")
          EOF

      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload fat JAR
        uses: actions/upload-artifact@v7
        with:
          name: gentepede-jar
          path: build/libs/gentepede-mcp-all.jar
          retention-days: 1

      # Starts the JAR, sends initialize + tools/list via JSON-RPC, and verifies
      # all 8 expected tools are registered. Tests Main.kt + Engine.kt protocol layer.
      - name: MCP protocol smoke test
        run: python3 .github/scripts/mcp-smoke-test.py

      # Check that all internal file links in Markdown docs resolve to real files.
      # Uses --offline to skip external URL checks (avoids rate-limit flakiness in CI).
      # External URLs are verified in the weekly blueprint-verify.yml run instead.
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude-path .gradle
            --exclude-path build
            '**/*.md'
          fail: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Blueprint generate + validate for all 6 blueprints
  # Runs terraform validate + checkov. No AWS API calls — fully static analysis.
  # Runs on every merge so CI catches template issues immediately, not a week later.
  # ─────────────────────────────────────────────────────────────────────────────
  blueprint-validate:
    name: Blueprint Validate (all 6)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Download fat JAR
        uses: actions/download-artifact@v8
        with:
          name: gentepede-jar
          path: build/libs/

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Install checkov
        run: pip install checkov

      - name: Validate all blueprints
        run: |
          set -e
          FAILED=""
          for blueprint_file in src/main/resources/blueprints/*.json; do
            id=$(python3 -c "import json; print(json.load(open('$blueprint_file'))['blueprintId'])")
            echo "── Validating $id ──"
            java -cp build/libs/gentepede-mcp-all.jar \
              com.gentepede.ci.BlueprintVerifierKt \
              --blueprint "$id" \
              --project "ci-validate-${id}" \
            && echo "PASS: $id" || { echo "FAIL: $id"; FAILED="$FAILED $id"; }
          done
          if [ -n "$FAILED" ]; then
            echo "Blueprints that failed validation:$FAILED"
            exit 1
          fi
          echo "All blueprints validated successfully"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Submit Gradle dependency graph to GitHub
  # Populates GitHub's dependency graph so the dependency-review.yml workflow
  # can compare dependencies before and after each PR. Runs only on pushes to
  # main (not on fork PRs, which lack write permission).
  # ─────────────────────────────────────────────────────────────────────────────
  submit-dependency-graph:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@v4
