name: Integration Test (LocalStack)

# Runs on every push/PR to main alongside ci.yml.
# Tests the full generate → validate → plan → apply → drift → audit → destroy
# flow against LocalStack Community (free tier) so regressions in the actual
# tool logic are caught before merge, not during a weekly run.
#
# Blueprint under test: ktor-dynamodb
#   All resources this blueprint provisions are supported by LocalStack Community:
#   VPC, subnets, IGW, NAT Gateway, ALB, security groups, ECS cluster, ECS task
#   definition, ECS service, DynamoDB table, KMS key, CloudWatch log group, IAM
#   roles and policies, VPC Flow Logs.
#
# Blueprints NOT covered here (require LocalStack Pro or real AWS):
#   springboot-postgres (RDS — Community support is limited for multi-AZ)
#   fastapi-redis       (ElastiCache replication group — Pro only)
#   springboot-eks      (EKS — Pro only)
#   nodejs-eks          (EKS — Pro only)
#   nodejs-s3           (CloudFront OAC — Community support varies by version)
# These are caught by the static terraform validate step in ci.yml and the
# weekly blueprint-verify.yml run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integration:
    name: LocalStack Integration (ktor-dynamodb)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          # Explicitly list the services used by the ktor-dynamodb ECS template.
          # LocalStack Community starts all services by default; this is advisory.
          SERVICES: s3,ec2,iam,ecs,dynamodb,kms,logs,elasticloadbalancingv2,sts
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | python3 -c \"import json,sys; s=json.load(sys.stdin)['services']; assert all(v in ('running','available') for v in s.values()), s\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Install checkov
        run: pip install checkov

      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Wait for LocalStack to be healthy
        run: |
          echo "Waiting for LocalStack..."
          for i in $(seq 1 30); do
            health=$(curl -sf http://localhost:4566/_localstack/health 2>/dev/null || echo "{}")
            echo "  health check $i: $health"
            if echo "$health" | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          services = data.get('services', {})
          ready = all(v in ('running', 'available') for v in services.values())
          sys.exit(0 if ready and services else 1)
          " 2>/dev/null; then
              echo "LocalStack is healthy"
              break
            fi
            sleep 3
          done

      - name: Run full integration test (ktor-dynamodb)
        env:
          GENTEPEDE_MODE: LOCAL
          # LocalStack credentials — any value is accepted by the mock provider.
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          java -cp build/libs/gentepede-mcp-all.jar \
            com.gentepede.ci.IntegrationVerifierKt \
            --blueprint ktor-dynamodb \
            --project ci-integration-ktor \
            --var container_image=public.ecr.aws/docker/library/nginx:latest \
            --var certificate_arn=arn:aws:acm:us-east-1:000000000000:certificate/ci-test \
            --var dynamodb_table_name=ci-test-table

      - name: Print LocalStack logs on failure
        if: failure()
        run: docker logs $(docker ps -q --filter ancestor=localstack/localstack:3) 2>/dev/null || true
