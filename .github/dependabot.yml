version: 2

updates:
  # Keep Gradle dependencies (MCP SDK, kotlinx, coroutines, JUnit) up to date.
  # Dependabot opens one PR per outdated dependency, capped at 5 open PRs at a time.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    ignore:
      # JUnit 6 has breaking API changes; block major-version bumps only.
      # Tests use explicit Assertions.assertNotNull/assertNull to avoid Kotlin contract
      # extension overload ambiguity that affected 5.13.x and 5.14.x with star-imports.
      - dependency-name: "org.junit.jupiter:junit-jupiter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.junit.jupiter:junit-jupiter-params"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions versions (actions/checkout, setup-java, etc.) up to date.
  # Uses SHA pinning for third-party actions; Dependabot auto-updates those SHAs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
