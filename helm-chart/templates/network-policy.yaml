# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes NetworkPolicy — Pod-Level Firewall Rules
#
# By default in Kubernetes, ALL pods can talk to ALL other pods in ALL
# namespaces. This means a compromised pod (e.g., a vulnerability in an npm
# dependency) could freely connect to your database pods, scrape credentials
# from sidecar containers, or send data to the internet.
#
# A NetworkPolicy is a Kubernetes resource that restricts this open connectivity.
# It acts as a firewall at the pod level, applied based on label selectors.
#
# KEY CONCEPT — Default Deny:
#   When a NetworkPolicy selects a pod AND specifies policyTypes: [Ingress, Egress],
#   ALL traffic not explicitly allowed by a rule is DENIED. This is "default deny"
#   for those pods. Pods with no NetworkPolicy selecting them remain wide open.
#
# This policy selects pods with label `app: <release-name>` and enforces:
#
# INGRESS (traffic coming INTO the pod):
#   Only allowed from the ingress-nginx namespace or kube-system namespace,
#   on the application's container port. This means only the ALB Ingress
#   Controller can reach the pod — not other application pods, not test pods,
#   not anything from other namespaces.
#
# EGRESS (traffic going OUT FROM the pod):
#   Four explicit allowances:
#   - Port 53 (DNS)  — pods need DNS to resolve "my-service.default.svc.cluster.local"
#                      or external hostnames like "rds.amazonaws.com"
#   - Port 443 (HTTPS) — AWS API calls (ECR, Secrets Manager, S3, CloudWatch)
#                        go over HTTPS; the NAT Gateway relays them to the internet
#   - Port 5432 (PostgreSQL) — reach the RDS instance (for springboot-eks blueprint)
#   - Port 6379 (Redis) — reach ElastiCache (if present)
#
# Without the DNS egress rule, the pod cannot resolve ANY hostname, including
# Kubernetes internal service names. Everything would fail with name lookup errors.
#
# Note: NetworkPolicy is enforced by the CNI plugin (Container Network Interface).
# The EKS cluster uses the Amazon VPC CNI which DOES support NetworkPolicy.
# On a cluster without a CNI that supports NetworkPolicy, these rules are ignored.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    managed-by: gentepede-mcp
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the ingress-nginx or aws-load-balancer-controller namespace.
    # Without a NetworkPolicy, any pod in any namespace can reach this service.
    # A compromised pod elsewhere in the cluster could exfiltrate data or pivot into this service.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: {{ .Values.containerPort }}
          protocol: TCP
  egress:
    # Allow DNS resolution — without this, pods cannot resolve service names or external hosts.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS egress for AWS API calls (ECR, Secrets Manager, etc.) and external dependencies.
    - ports:
        - port: 443
          protocol: TCP
    # Allow PostgreSQL egress to the RDS subnet (private subnet CIDR).
    - ports:
        - port: 5432
          protocol: TCP
    # Allow Redis egress to the ElastiCache subnet.
    - ports:
        - port: 6379
          protocol: TCP
