name: Blueprint Verification

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  verify-blueprints:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: s3,ec2,iam,rds,dynamodb,ecs,ecr,eks,elasticache,kms,cloudfront,apigateway,lambda
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Install checkov
        run: pip install checkov

      - name: Build fat JAR
        run: ./gradlew shadowJar

      - name: Verify LocalStack health
        run: |
          curl -f http://localhost:4566/_localstack/health
          echo "LocalStack is healthy"

      - name: Verify blueprints
        id: verify
        env:
          GENTEPEDE_MODE: LOCAL
        run: |
          set -e
          FAILED_BLUEPRINTS=""
          declare -A BLUEPRINT_ERRORS

          for blueprint_file in src/main/resources/blueprints/*.json; do
            blueprint_id=$(python3 -c "import json,sys; d=json.load(open('$blueprint_file')); print(d['blueprintId'])")
            provider_version=$(python3 -c "import json,sys; d=json.load(open('$blueprint_file')); print(d['terraformProviderVersion'])")
            echo "=== Verifying blueprint: $blueprint_id (provider $provider_version) ==="

            # Call InfrastructureService directly via the test harness (no MCP server needed)
            result=$(java -cp build/libs/gentepede-mcp-all.jar \
              -DGENTEPEDE_MODE=LOCAL \
              com.gentepede.ci.BlueprintVerifierKt \
              --blueprint "$blueprint_id" \
              --project "ci-verify-${blueprint_id}" \
              2>&1) || {
              echo "FAILED: $blueprint_id"
              echo "Error: $result"
              FAILED_BLUEPRINTS="$FAILED_BLUEPRINTS $blueprint_id"
              BLUEPRINT_ERRORS[$blueprint_id]="$result"
              continue
            }

            echo "Passed: $blueprint_id"
          done

          if [ -n "$FAILED_BLUEPRINTS" ]; then
            echo "failed_blueprints=$FAILED_BLUEPRINTS" >> "$GITHUB_OUTPUT"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            for bp in $FAILED_BLUEPRINTS; do
              echo "FAILED[$bp]: ${BLUEPRINT_ERRORS[$bp]}"
            done
            exit 1
          fi

          echo "has_failures=false" >> "$GITHUB_OUTPUT"
          echo "All blueprints verified successfully"

      - name: Open GitHub issue on failure
        if: failure() && steps.verify.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for blueprint_id in ${{ steps.verify.outputs.failed_blueprints }}; do
            provider_version=$(python3 -c "import json; d=json.load(open('src/main/resources/blueprints/${blueprint_id}.json')); print(d['terraformProviderVersion'])")
            gh issue create \
              --title "Blueprint '${blueprint_id}' failed weekly verification" \
              --body "**Blueprint:** \`${blueprint_id}\`
          **Provider version:** \`${provider_version}\`
          **Date:** $(date -u +%Y-%m-%d)
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate the failure and update the blueprint or template accordingly.
          After fixing, verify locally with:
          \`\`\`bash
          ./gradlew shadowJar
          GENTEPEDE_MODE=LOCAL java -cp build/libs/gentepede-mcp-all.jar \\
            com.gentepede.ci.BlueprintVerifierKt \\
            --blueprint ${blueprint_id} --project ci-verify-${blueprint_id}
          \`\`\`" \
              --label "bug,blueprint-verification"
          done

      - name: Update lastVerifiedDate on success
        if: success()
        run: |
          VERIFIED_DATE=$(date -u +%Y-%m)
          for blueprint_file in src/main/resources/blueprints/*.json; do
            python3 -c "
          import json, sys
          with open('$blueprint_file', 'r') as f:
              d = json.load(f)
          d['lastVerifiedDate'] = '$VERIFIED_DATE'
          with open('$blueprint_file', 'w') as f:
              json.dump(d, f, indent=2)
              f.write('\n')
          "
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/blueprints/
          git diff --staged --quiet || git commit -m "chore: update blueprint lastVerifiedDate to $VERIFIED_DATE [skip ci]"
          git push
